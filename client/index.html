<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cgraph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #202020;
      color: #dcddde;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #header {
      height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    }
    #project-name { color: #dcddde; font-size: 13px; font-weight: 500; }
    #stats { color: #666; font-size: 13px; }
    #graph { width: 100vw; height: calc(100vh - 40px); }

    #tooltip {
      position: fixed; display: none;
      background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 6px; padding: 8px 12px;
      pointer-events: none; z-index: 1000;
    }
    .tooltip-path { color: #dcddde; font-size: 13px; margin-bottom: 4px; }
    .tooltip-exports { color: #999; font-size: 11px; margin-bottom: 2px; }
    .tooltip-edges { color: #666; font-size: 11px; }

    /* Panel */
    #panel {
      position: fixed; top: 52px; right: 12px;
      width: 244px; max-height: calc(100vh - 64px);
      background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 12px; z-index: 998;
      overflow-y: auto; overflow-x: hidden;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #panel.collapsed { opacity: 0; pointer-events: none; transform: translateY(-8px) scale(0.97); }
    #panel-toggle {
      position: fixed; top: 48px; right: 14px;
      width: 32px; height: 32px;
      background: #333; border: 1px solid #444;
      border-radius: 8px; color: #999;
      font-size: 20px; cursor: pointer;
      z-index: 999; display: flex;
      align-items: center; justify-content: center;
    }
    #panel-toggle.open { background: #3a3a3a; color: #ddd; }
    #panel-toggle:hover { background: #444; color: #ddd; }

    .panel-section { border-bottom: 1px solid #333; }
    .panel-section:last-child { border-bottom: none; }
    .section-header {
      padding: 8px 12px;
      color: #dcddde; font-size: 12px; font-weight: 500;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 6px;
    }
    .section-header:hover { background: #303030; }
    .section-header .chevron {
      width: 16px; height: 16px; flex-shrink: 0;
      color: #666; transition: transform 0.15s;
    }
    .section-header .chevron.open { transform: rotate(90deg); }
    .section-header .section-title { flex: 1; }
    .section-header .section-actions { display: flex; gap: 4px; }
    .section-header .section-actions button {
      background: none; border: none; color: #666;
      cursor: pointer; padding: 2px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .section-header .section-actions button:hover { color: #ddd; background: #3a3a3a; }
    .section-body { padding: 4px 12px 10px; display: none; }
    .section-body.open { display: block; }

    .ctrl-row {
      display: flex; align-items: center;
      justify-content: space-between;
      height: 28px;
    }
    .ctrl-label { color: #999; font-size: 11px; }
    .ctrl-row input[type="range"] {
      width: 96px; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: #444; border-radius: 2px; outline: none;
    }
    .ctrl-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px;
      background: #ddd; border-radius: 50%; cursor: pointer;
    }
    .toggle-switch { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #444; border-radius: 9px; cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-track::after {
      content: ""; position: absolute;
      width: 14px; height: 14px;
      left: 2px; top: 2px;
      background: #ddd; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: #7f6df2; }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

    .search-wrap {
      position: relative; margin-bottom: 6px;
    }
    .search-wrap .search-icon {
      position: absolute; left: 8px; top: 50%;
      transform: translateY(-50%);
      color: #666; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 5px 8px 5px 28px;
      background: #333; border: 1px solid #444;
      border-radius: 6px; color: #ddd;
      font-size: 11px; outline: none;
    }
    .search-input::placeholder { color: #555; }
    .search-input:focus { border-color: #7f6df2; }

    #empty-state, #error-state {
      display: none; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center;
    }
    #empty-state h2, #error-state h2 { color: #dcddde; font-size: 18px; margin-bottom: 8px; }
    #empty-state p, #error-state p { color: #999; font-size: 13px; }

    .pill.active { background: #7f6df2 !important; color: #fff !important; border-color: #7f6df2 !important; }
    .pill:hover { background: #444 !important; color: #ddd !important; }
    .pill.active:hover { background: #6b5ce0 !important; }
    #header-search:focus { border-color: #7f6df2; }
    #btn-back:not(:disabled):hover, #btn-forward:not(:disabled):hover { background: #444; color: #ddd; }
    #btn-back:not(:disabled), #btn-forward:not(:disabled) { opacity: 1; cursor: pointer; }
  </style>
</head>
<body>
  <div id="header">
    <div id="header-left" style="display:flex;align-items:center;gap:8px;">
      <button id="btn-back" title="Back" style="width:28px;height:28px;background:#333;border:1px solid #444;border-radius:6px;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.4;cursor:default;" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="btn-forward" title="Forward" style="width:28px;height:28px;background:#333;border:1px solid #444;border-radius:6px;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.4;cursor:default;" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <span id="project-name"></span>
      <input type="text" id="header-search" placeholder="Search symbols..." style="width:200px;padding:4px 8px;background:#333;border:1px solid #444;border-radius:6px;color:#ddd;font-size:13px;outline:none;" />
    </div>
    <div id="header-center" style="display:flex;align-items:center;gap:8px;">
      <div id="quick-filters" style="display:flex;gap:4px;">
        <button class="pill" data-filter="functions" style="padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid #444;background:#333;color:#999;cursor:pointer;">Functions</button>
        <button class="pill" data-filter="classes" style="padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid #444;background:#333;color:#999;cursor:pointer;">Classes</button>
        <button class="pill" data-filter="imports" style="padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid #444;background:#333;color:#999;cursor:pointer;">Imports</button>
        <button class="pill" data-filter="calls" style="padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid #444;background:#333;color:#999;cursor:pointer;">Calls</button>
      </div>
    </div>
    <div id="header-right" style="display:flex;align-items:center;gap:8px;">
      <span id="stats"></span>
    </div>
  </div>
  <div id="breadcrumb" style="position:absolute;top:48px;left:16px;z-index:100;display:flex;align-items:center;gap:4px;font-size:12px;color:#999;display:none;"></div>
  <div id="focus-hint" style="position:absolute;top:48px;right:270px;z-index:100;font-size:11px;color:#666;display:none;">Press Esc to exit focus</div>
  <div id="graph"></div>
  <div id="tooltip">
    <div class="tooltip-path"></div>
    <div class="tooltip-exports"></div>
    <div class="tooltip-edges"></div>
  </div>

  <button id="panel-toggle" class="open" title="Toggle settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
  <div id="panel">

    <div class="panel-section">
      <div class="section-header" data-section="filters">
        <svg class="chevron open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="section-title">Filters</span>
        <span class="section-actions">
          <button id="btn-reset-filters" title="Reset filters"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
        </span>
      </div>
      <div class="section-body open" id="sec-filters">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="search-files" placeholder="Search files...">
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Orphans</span>
          <label class="toggle-switch"><input type="checkbox" id="toggle-orphans" checked><span class="toggle-track"></span></label>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-header" data-section="display">
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="section-title">Display</span>
      </div>
      <div class="section-body" id="sec-display">
        <div class="ctrl-row">
          <span class="ctrl-label">Arrows</span>
          <label class="toggle-switch"><input type="checkbox" id="toggle-arrows" checked><span class="toggle-track"></span></label>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Labels</span>
          <label class="toggle-switch"><input type="checkbox" id="toggle-labels" checked><span class="toggle-track"></span></label>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Dir halos</span>
          <label class="toggle-switch"><input type="checkbox" id="halos-toggle"><span class="toggle-track"></span></label>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Node size</span>
          <input type="range" id="slider-node-size" min="0.3" max="3" step="0.1" value="1">
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Label size</span>
          <input type="range" id="slider-label-size" min="6" max="20" step="1" value="11">
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-header" data-section="forces">
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="section-title">Forces</span>
      </div>
      <div class="section-body" id="sec-forces">
        <div class="ctrl-row">
          <span class="ctrl-label">Center force</span>
          <input type="range" id="slider-center" min="0" max="1" step="0.01" value="0.12">
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Repel force</span>
          <input type="range" id="slider-repel" min="0" max="300" step="5" value="60">
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Link force</span>
          <input type="range" id="slider-link-force" min="0" max="1" step="0.05" value="0.9">
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Link distance</span>
          <input type="range" id="slider-link-dist" min="10" max="200" step="5" value="50">
        </div>
      </div>
    </div>

  </div>

  <div id="empty-state">
    <h2>No files found</h2>
    <p id="empty-message"></p>
  </div>
  <div id="error-state">
    <h2>Failed to load graph data</h2>
    <p id="error-message"></p>
  </div>
  <script src="d3.v7.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
