<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cgraph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #202020;
      color: #dcddde;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #header {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }
    #project-name {
      color: #dcddde;
      font-size: 13px;
      font-weight: 500;
    }
    #stats {
      color: #666;
      font-size: 13px;
    }
    #graph {
      width: 100vw;
      height: calc(100vh - 40px);
    }
    #tooltip {
      position: fixed;
      display: none;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 8px 12px;
      pointer-events: none;
      z-index: 1000;
    }
    .tooltip-path {
      color: #dcddde;
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 4px;
    }
    .tooltip-exports {
      color: #999;
      font-size: 11px;
      font-weight: 400;
      margin-bottom: 2px;
    }
    .tooltip-edges {
      color: #666;
      font-size: 11px;
      font-weight: 400;
    }
    #legend {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 180px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 16px;
      z-index: 999;
    }
    .legend-header {
      color: #999;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .legend-content {
      margin-top: 8px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      color: #999;
      font-size: 11px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #3a3a3a;
    }
    .toggle-row label {
      color: #999;
      font-size: 11px;
      cursor: pointer;
    }
    #empty-state {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #empty-state h2 {
      color: #dcddde;
      font-size: 18px;
      margin-bottom: 8px;
    }
    #empty-state p {
      color: #999;
      font-size: 13px;
    }
    #error-state {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #error-state h2 {
      color: #dcddde;
      font-size: 18px;
      margin-bottom: 8px;
    }
    #error-state p {
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="header">
    <span id="project-name"></span>
    <span id="stats"></span>
  </div>
  <div id="graph"></div>
  <div id="tooltip">
    <div class="tooltip-path"></div>
    <div class="tooltip-exports"></div>
    <div class="tooltip-edges"></div>
  </div>
  <div id="legend">
    <div class="legend-header">Legend &#9662;</div>
    <div class="legend-content">
      <div class="legend-row">
        <div class="legend-swatch" style="background:#7f6df2"></div>
        <span class="legend-label">File (active)</span>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background:#a882ff"></div>
        <span class="legend-label">Connected</span>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background:#555"></div>
        <span class="legend-label">File (idle)</span>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="halos-toggle">
        <label for="halos-toggle">Directory halos</label>
      </div>
    </div>
  </div>
  <div id="empty-state">
    <h2>No files found</h2>
    <p id="empty-message"></p>
  </div>
  <div id="error-state">
    <h2>Failed to load graph data</h2>
    <p id="error-message"></p>
  </div>
  <script src="d3.v7.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
